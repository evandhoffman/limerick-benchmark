name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run python -m unittest discover tests -v
